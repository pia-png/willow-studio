<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Willow Studio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="content-container">

  <h1>Willow Studio</h1>
  <p>Type something below to preview willow.</p>

  <!-- Presets -->
  <div class="presets">
    <button class="preset" id="journal">Journal</button>
    <button class="preset" id="poster">Poster</button>
    <button class="preset" id="signature">Signature</button>
    <button class="preset" id="randomQuote">Quote</button>
  </div>

  <!-- Text Input -->
  <div class="try-container">
    <input
      type="text"
      id="userInput"
      placeholder="Type here...">
  </div>

  <!-- Workspace -->
  <div class="workspace">

    <!-- Left Controls -->
    <aside class="control-panel">
      <h4>Font Controls</h4>

      <div class="control">
        <label for="fontSize">
          Font Size
          <span id="fontSizeValue">60px</span>
        </label>
        <input type="range" id="fontSize" min="20" max="120" value="60">
      </div>

      <div class="control">
        <label for="spacing">
          Letter Spacing
          <span id="spacingValue">0px</span>
        </label>
        <input type="range" id="spacing" min="-2" max="15" value="0">
      </div>

      <div class="control">
        <label for="lineHeight">
          Line Height
          <span id="lineHeightValue">1.4</span>
        </label>
        <input type="range" id="lineHeight" min="1" max="3" step="0.1" value="1.4">
      </div>

      <div class="control">
        <label for="textColor">Text Color</label>
        <input type="color" id="textColor" value="#ffffff">
      </div>

      <div class="control">
        <label for="bgColor">Preview Background</label>
        <input type="color" id="bgColor" value="#000000">
      </div>
    </aside>

    <!-- Right Preview -->
    <section class="preview-panel">
      <div class="preview-box">
        <p id="preview">The quick brown fox jumped over the lazy dog.</p>
      </div>
    </section>

  </div>

  <div class="download">
    <button id="downloadBtn">Download PNG</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="script.js"></script>
</body>
</html>
